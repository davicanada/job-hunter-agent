name: Job Hunter

on:
  schedule:
    # Three cron runs per day (UTC).
    - cron: '0 12 * * *'   # 12:00 UTC  -> 08:00 EDT / 07:00 EST (morning Montreal)
    - cron: '0 19 * * *'   # 19:00 UTC  -> 15:00 EDT / 14:00 EST (afternoon Montreal)
    - cron: '0 1 * * *'    # 01:00 UTC  -> 21:00 EDT / 20:00 EST (evening Montreal)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: pytest tests/ -v

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_SCORE_TO_NOTIFY:  '70'
          MAX_JOBS_PER_RUN:     '5'
          DRY_RUN:              'false'
          LOG_LEVEL:            'INFO'
        run: python -m src.main
